version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app          # nginx waits for app container to start first

  app:
    build:
      context: ./Module-3-deployment
      dockerfile: Dockerfile
    container_name: express-app
    expose:
      - "3000"
    restart: unless-stopped